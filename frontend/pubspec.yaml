name: frontend
description: "ManasGriha — AI Advisory Chatroom"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: Alpino
      fonts:
        - asset: assets/fonts/Alpino-Regular.ttf

    - family: Gambarino
      fonts:
        - asset: assets/fonts/Gambarino-Regular.ttf

    - family: Rounded
      fonts:
        - asset: assets/fonts/Rounded-Regular.ttf